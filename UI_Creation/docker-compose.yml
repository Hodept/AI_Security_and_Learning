name: ai-security-rag

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LOG_MAX_SIZE:-10m}"
    max-file: "${LOG_MAX_FILE:-3}"

x-common-env: &common-env
  TZ: "${TZ:-UTC}"

x-app-build: &app-build
  image: ai-security-rag-app:latest
  build:
    context: ..
    dockerfile: UI_Creation/Dockerfile.rag-api

# Optional NVIDIA GPU configuration for the GCP ai-dev-node:
# - Ubuntu 22.04.5 LTS, kernel 6.8.0-1054-gcp
# - 8 vCPU, 31.34 GiB RAM
# - NVIDIA Tesla T4
#
# Before enabling this block, verify the host has the NVIDIA driver and
# NVIDIA Container Toolkit configured:
#
#   nvidia-smi
#   docker run --rm --gpus all nvidia/cuda:12.4.1-base-ubuntu22.04 nvidia-smi
#
# To enable GPU for a service, uncomment the merge line:
#
#   <<: *nvidia-gpu
#
# inside that service.
x-nvidia-gpu: &nvidia-gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: ["gpu"]

services:
  ollama:
    image: ollama/ollama:latest
    <<: *nvidia-gpu
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - "${OLLAMA_DATA_PATH:-/data-ssd/ollama}:/root/.ollama"
    environment:
      <<: *common-env
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-10m}"
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL:-1}"
      OLLAMA_MAX_LOADED_MODELS: "${OLLAMA_MAX_LOADED_MODELS:-1}"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped

  ollama-model-init:
    image: ollama/ollama:latest
    environment:
      <<: *common-env
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    command: ["pull", "${OLLAMA_MODEL:-llama3}"]
    logging: *default-logging
    restart: "no"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_HTTP_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    volumes:
      - "${QDRANT_DATA_PATH:-/data-ssd/qdrant}:/qdrant/storage"
    environment:
      <<: *common-env
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: "${QDRANT_MAX_SEARCH_THREADS:-4}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 5 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

  rag-api:
    <<: *app-build
    ports:
      - "${RAG_API_HOST_PORT:-8010}:8000"
    volumes:
      - ..:/app
      - "${HF_CACHE_PATH:-/data/huggingface}:/root/.cache/huggingface"
      - "${TORCH_CACHE_PATH:-/data/torch}:/root/.cache/torch"
    environment:
      <<: *common-env
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-pdf_chunks}"
      QDRANT_API_KEY: "${QDRANT_API_KEY:-}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-sentence-transformers/multi-qa-distilbert-cos-v1}"
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3}"
      TOP_K: "${TOP_K:-5}"
      CANDIDATE_K: "${CANDIDATE_K:-20}"
      QDRANT_TIMEOUT: "${QDRANT_TIMEOUT:-30}"
      OLLAMA_TIMEOUT: "${OLLAMA_TIMEOUT:-300}"
      DEBUG_RAG: "${DEBUG_RAG:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TOKENIZERS_PARALLELISM: "${TOKENIZERS_PARALLELISM:-false}"
      OMP_NUM_THREADS: "${OMP_NUM_THREADS:-4}"
      MKL_NUM_THREADS: "${MKL_NUM_THREADS:-4}"
    depends_on:
      qdrant:
        condition: service_healthy
      ollama-model-init:
        condition: service_completed_successfully
    command: ["uvicorn", "rag_api:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 20s
    logging: *default-logging
    restart: unless-stopped

  streamlit:
    <<: *app-build
    ports:
      - "${STREAMLIT_HOST_PORT:-8501}:8501"
    volumes:
      - ..:/app
    environment:
      <<: *common-env
      RAG_API_URL: http://rag-api:8000
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-pdf_chunks}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-sentence-transformers/multi-qa-distilbert-cos-v1}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3}"
      TOP_K: "${TOP_K:-5}"
      CANDIDATE_K: "${CANDIDATE_K:-20}"
      QDRANT_TIMEOUT: "${QDRANT_TIMEOUT:-30}"
      OLLAMA_TIMEOUT: "${OLLAMA_TIMEOUT:-300}"
      RAG_API_REQUEST_TIMEOUT: "${RAG_API_REQUEST_TIMEOUT:-330}"
      DEBUG_RAG: "${DEBUG_RAG:-false}"
    depends_on:
      rag-api:
        condition: service_healthy
    command: ["streamlit", "run", "UI_Creation/app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    logging: *default-logging
    restart: unless-stopped
